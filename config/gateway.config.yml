http:
  port: 8080
admin:
  port: 9876
  host: localhost
apiEndpoints:
  api:
    host: localhost
    paths: '/ip'
  authorizer:
    host: localhost
    methods: "GET,POST,PUT"
    paths: "/authorizer*"
  credits:
    host: localhost
    methods: "GET,POST,PUT"
    paths: "/credits*"
  payments:
    host: localhost
    methods: "GET,POST,PUT"
    paths: "/payments*"
  transactions:
    host: localhost
    methods: "GET,POST,PUT"
    paths: "/transactions*"
serviceEndpoints:
  httpbin:
    url: 'https://httpbin.org'
  authorizerService:
    url: "http://localhost:4000"
  creditsService:
    url: "http://localhost:4001"
  paymentsService:
    url: "http://localhost:4002"
  transactionsService:
    url: "http://localhost:4003"
policies:
  - basic-auth
  - cors
  - expression
  - key-auth
  - log
  - oauth2
  - proxy
  - rate-limit
pipelines:
  default:
    apiEndpoints:
      - api
    policies:
    # Uncomment `key-auth:` when instructed to in the Getting Started guide.
    # - key-auth:
      - proxy:
          - action:
              serviceEndpoint: httpbin 
              changeOrigin: true
  authorizer:
    apiEndpoints:
      - authorizer
    policies:
    # Uncomment `key-auth:` when instructed to in the Getting Started guide.
    # - key-auth:
      - proxy:
          - action:
              serviceEndpoint: authorizerService 
              changeOrigin: true
  credits:
    apiEndpoints:
      - credits
    policies:
    # Uncomment `key-auth:` when instructed to in the Getting Started guide.
    # - key-auth:
      - proxy:
          - action:
              serviceEndpoint: creditsService
              changeOrigin: true
  payments:
    apiEndpoints:
      - payments
    policies:
    # Uncomment `key-auth:` when instructed to in the Getting Started guide.
    # - key-auth:
      - proxy:
          - action:
              serviceEndpoint: paymentsService 
              changeOrigin: true
  transactions:
    apiEndpoints:
      - transactions
    policies:
    # Uncomment `key-auth:` when instructed to in the Getting Started guide.
    # - key-auth:
      - proxy:
          - action:
              serviceEndpoint: transactionsService
              changeOrigin: true
